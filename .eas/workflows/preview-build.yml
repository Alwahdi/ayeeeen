name: Preview Build (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: preview

  # build_ios:
  #   type: build
  #   params:
  #     platform: ios
  #     profile: preview

  update_preview:
    type: update
    needs: [build_android]
    params:
      branch: preview
